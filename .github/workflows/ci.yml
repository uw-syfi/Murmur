name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # libsndfile is the system dependency soundfile needs.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      # CPU-only: install just the subset the tests touch (no datasets / meeteval
      # / pyannote / whisperx, and no model download). Keeps CI to ~1-2 min.
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers numpy soundfile jiwer pytest

      - name: Run tests
        run: pytest -q
